name: Deploy Azure Function App

on:
  push:
    branches:
      - main

env:
  AZURE_FUNCTIONAPP_NAME: cloudobs-functions-dev
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "./function-app"
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          cd function-app

          python -m pip install --upgrade pip

          pip install \
            -r requirements.txt \
            --target=".python_packages/lib/site-packages"

      - name: Verify Blob Package
        run: |
          ls function-app/.python_packages/lib/site-packages/azure/storage

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Verify Deployment Package Contents
        run: |
          find function-app/.python_packages -type d | grep azure | head -20
